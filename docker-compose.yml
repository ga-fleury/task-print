services:
  print-task:
    build: .
    container_name: print-task
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      PRINTER_HOST: ${PRINTER_HOST:-192.168.15.26}
      PRINTER_PORT: ${PRINTER_PORT:-9100}
      PRINTER_TIMEOUT: ${PRINTER_TIMEOUT:-10}
      DRY_RUN: ${DRY_RUN:-0}
      IMAGE_FETCH_TIMEOUT: ${IMAGE_FETCH_TIMEOUT:-5}
      IMAGE_MAX_BYTES: ${IMAGE_MAX_BYTES:-5242880}
      TZ: ${TZ:-America/Sao_Paulo}
